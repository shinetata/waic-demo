[project]
name = "ap-protocol"
version = "0.1.0"
description = "Active Perception 轨迹协议（Pydantic v2 模型），与 schema/trajectory.schema.json 对齐"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ap_protocol"]
